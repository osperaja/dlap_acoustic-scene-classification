model: CNNTCNModel

data:
  sample_rate: 44100
  batch_size: 128
  n_workers: 8
  mono: true
  multi_stream: false
  # base_data_path: '/data/baproj/dlap'
  base_data_path: './data/dcase'

experiment:
  learning_rate: 0.02
  max_epochs: 250
  n_label: 15
  optimizer_type: "SGD"
  use_scheduler: true

network:
  n_fft: 2048
  n_mels: 128
  f_min: 0
  f_max: 22050
  dropout: 0.0
  
  # CNN parameters
  cnn_channels: [32, 64]
  cnn_kernel_size: [3, 3]
  cnn_pool_size: [2, 2]
  
  # TCN parameters  
  tcn_channels: [64, 64]
  tcn_kernel_size: 3
  
  # Classifier
  classifier_hidden: 512

augmentation:
  spec_augment: true
  freq_mask_param: 15        
  time_mask_param: 20
  n_freq_masks: 2
  n_time_masks: 2
  use_mixup: false
  mixup_alpha: 0.3           

training:
  max_epochs: 300
  strategy: auto
  accelerator: auto
  devices: 1

logging:
# Sppc paths
  #tb_log_dir: "~/dcase/tb_logs/"
  #ckpt_dir: "~/dcase/ckpts/"

  tb_log_dir: "./data/tb_logs/"
  ckpt_dir: "./data/ckpts/"
