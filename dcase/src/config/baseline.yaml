data:
  sample_rate: 44100
  mono: 1
  batch_size: 8
  n_workers: 16

experiment:
  learning_rate: 0.001
  n_label: 15

network:
  n_fft: 2048
  n_mels: 40
  dropout: 0.2
  n_aggregate: 5
  n_hidden_feats: 50
  n_hidden_layer: 2
  f_min: 0
  f_max: 22050

training:
  max_epochs: 200
  strategy: ddp
  accelerator: gpu
  devices: 1

logging:
  tb_log_dir: "~/dcase/tb_logs/"
  ckpt_dir: "~/dcase/ckpts/"