model: CNNModel

data:
  sample_rate: 44100
  mono: 1
  batch_size: 8
  n_workers: 16

experiment:
  learning_rate: 0.0001
  max_epochs: 200
  n_label: 15

network:
  n_fft: 2048
  n_mels: 40
  dropout: 0.3
  f_min: 0
  f_max: 22050
  conv_channels: [32, 64, 128, 256]
  classifier_hidden: 256

augmentation:
  spec_augment: true
  freq_mask_param: 15
  time_mask_param: 15
  n_freq_masks: 2
  n_time_masks: 1
  use_mixup: true
  mixup_alpha: 0.2

training:
  max_epochs: 200
  strategy: auto
  accelerator: auto
  devices: 1

logging:
  tb_log_dir: "./data/tb_logs/"
  ckpt_dir: "./data/ckpts/"