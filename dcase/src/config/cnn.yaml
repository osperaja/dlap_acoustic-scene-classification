model: CNNModel

data:
  sample_rate: 44100
  batch_size: 8
  n_workers: 16
  mono: true
  multi_stream: false

experiment:
  learning_rate: 0.0001
  max_epochs: 200
  n_label: 15

network:
  n_fft: 2048
  n_mels: 96
  dropout: 0.3
  f_min: 0
  f_max: 22050
  cnn_conv_channels: [ 64, 128, 256 ]
  last_layer_pooling: false
  pooling: [ 2,2 ]
  classifier_hidden: 128

augmentation:
  cnn_spec_augment: true
  cnn_freq_mask_param: 15
  cnn_time_mask_param: 20
  cnn_n_freq_masks: 2
  cnn_n_time_masks: 2
  cnn_use_mixup: true
  cnn_mixup_alpha: 0.2

training:
  max_epochs: 200
  strategy: auto
  accelerator: auto
  devices: 1

logging:
  tb_log_dir: "./data/tb_logs/"
  ckpt_dir: "./data/ckpts/"