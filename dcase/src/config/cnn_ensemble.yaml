model: EnsembleCNNModel

data:
  base_data_path: "./data/dcase"
  sample_rate: 44100
  mono: false
  multi_stream: false
  batch_size: 16
  n_workers: 4

experiment:
  n_label: 15
  max_epochs: 200
  learning_rate: 0.0001

network:
  base_model_config:
    sample_rate: 44100
    n_mels: 40
    dropout: 0.3
    last_layer_pooling: false
    pooling: [ 2,2 ]
    n_label: 15
    spec_augment: false
    use_mixup: false
    conv_channels: [ 64, 128, 256 ] # [64, 128, 256] got a 74.4% accuracy
    classifier_hidden: 128
    freq_mask_param: 6
    time_mask_param: 10
    n_freq_masks: 1
    n_time_masks: 1
    mixup_alpha: 0.05

training:
  max_epochs: 200
  strategy: auto
  accelerator: auto
  devices: 1

logging:
  tb_log_dir: "./data/tb_logs/"
  ckpt_dir: "./data/ckpts/"