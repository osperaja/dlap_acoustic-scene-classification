model: LinSeqModel

data:
  sample_rate: 44100
  batch_size: 16
  n_workers: 16
  mono: true
  base_data_path: './data/dcase'
  multi_stream: false

experiment:
  learning_rate: 0.001
  max_epochs: 200
  n_label: 15
  optimizer_type: "AdamW"
  use_scheduler: false

network:
  n_fft: 2048
  n_mels: 40
  dropout: 0.35
  n_hidden_feats: 256
  n_hidden_layer: 3
  f_min: 0
  f_max: 22050

training:
  max_epochs: 200
  strategy: auto
  accelerator: auto
  devices: 1

logging:
  tb_log_dir: "./data/tb_logs/"
  ckpt_dir: "./data/ckpts/"
