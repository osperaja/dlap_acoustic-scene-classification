model: LinSeqModel

data:
  sample_rate: 44100
  mono: 1
  batch_size: 8
  n_workers: 16
experiment:
  learning_rate: 0.0001
  max_epochs: 200
  n_label: 15

network:
  n_fft: 2048
  n_mels: 40
  dropout: 0.1
  n_hidden_feats: 256
  n_hidden_layer: 4
  f_min: 0
  f_max: 22050

training:
  max_epochs: 200
  strategy: auto
  accelerator: auto
  devices: 1

logging:
  tb_log_dir: "./data/tb_logs/"
  ckpt_dir: "./data/ckpts/"
